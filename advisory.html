<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTech - AI Advisory</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">
    <header>
        <nav class="navbar dashboard-navbar">
            <div class="nav-logo">FinTech</div>
            <div class="nav-user-info">
                <span id="loggedInUserName"></span> | <a href="#" id="logoutButton">Logout</a>
            </div>
        </nav>
    </header>

    <div class="main-content">
        <aside class="sidebar">
            <h3>FinTech</h3>
            <ul>
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/expenses">Expenses</a></li>
                <li><a href="/savings">Savings Goals</a></li>
                <li><a href="/advisory" class="active">AI Advisory</a></li>
                <li><a href="/profile">Profile</a></li>
            </ul>
        </aside>

        <main class="content advisory-content">
            <h2>AI Financial Advisory</h2>

            <div class="advisory-layout">
                <div class="advisory-left card">
                    <h3>Your Financial Profile</h3>
                    <div class="form-group">
                        <label for="advisoryTotalSavings">Total Savings</label>
                        <input type="number" id="advisoryTotalSavings" name="advisoryTotalSavings" step="0.01" readonly>
                    </div>
                    <div class="form-group">
                        <label for="advisoryFinancialGoals">Financial Goals</label>
                        <textarea id="advisoryFinancialGoals" name="advisoryFinancialGoals" rows="4" readonly></textarea>
                    </div>
                    <div class="form-group">
                        <label for="riskTolerance">Risk Tolerance</label>
                        <select id="riskTolerance" name="riskTolerance">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="investmentTimeHorizon">Investment Time Horizon</label>
                        <select id="investmentTimeHorizon" name="investmentTimeHorizon">
                            <option value="Short-term">Short-term (1-3 years)</option>
                            <option value="Medium-term">Medium-term (3-7 years)</option>
                            <option value="Long-term">Long-term (7+ years)</option>
                        </select>
                    </div>
                    <button id="getAdviceButton" class="btn btn-primary">Get My Investment Plan</button>
                    <div id="advisoryFormMessage" class="message-box"></div>
                </div>

                <div class="advisory-right card">
                    <h3>Your Personalized Plan</h3>
                    <div id="personalizedPlanMessage">
                        <p style="text-align: center; padding: 20px; color: #888;">Your plan will appear here once you fill out your profile.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer>
        <p>&copy; 2023 FinTech. All rights reserved.</p>
    </footer>
    <script src="js/advisory.js"></script>
    <script src="js/auth.js"></script> <!-- For logout functionality -->
</body>
</html>
